name: Apply ZIP UI V3.1

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/zip-ui-alignment-v31'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply verified ZIP-aligned frontend
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d .agent/ui-v31 ]; then
            echo "Patch already applied"
            exit 0
          fi
          cat .agent/ui-v31/part* | base64 --decode > /tmp/tz-v31.zip
          rm -rf frontend/src
          rm -f frontend/index.html frontend/package.json frontend/package-lock.json frontend/tsconfig.json frontend/vite.config.ts
          unzip -oq /tmp/tz-v31.zip -d .
          rm -rf .agent
          rm -f .github/workflows/apply-zip-ui-v31.yml
          git config user.name "TZ Agent"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "3.1 align frontend with ZIP and fix startup diagnostics"
          git push origin HEAD:${{ github.head_ref }}
